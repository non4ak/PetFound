name: Build, migrate and deploy API to Azure App Service (staging)

on:
  push:
    branches:
      - main
    paths:
      - 'backend-app/Lostpet/**'

concurrency:
  group: staging-deploy
  cancel-in-progress: true

permissions:
  contents: read

env:
  DOTNET_VERSION: '9.0.x'
  PROJECT_PATH: './backend-app/Lostpet/Api/Api.csproj'
  STARTUP_PROJECT: './backend-app/Lostpet/Api'
  MIGRATIONS_PROJECT: './backend-app/Lostpet/Infrastructure'
  PUBLISH_DIR: './publish'
  AZURE_WEBAPP_NAME: 'pet-found'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Restore API
        run: dotnet restore ${{ env.PROJECT_PATH }}

      - name: Build API
        run: dotnet build ${{ env.PROJECT_PATH }} --configuration Release --no-restore

      - name: Publish API
        run: dotnet publish ${{ env.PROJECT_PATH }} --configuration Release --no-build --output ${{ env.PUBLISH_DIR }}

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}

  migrate:
    runs-on: ubuntu-latest
    needs: build
    environment:
      name: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - name: Install EF Core CLI
        run: dotnet tool install --global dotnet-ef

      - name: Apply database migrations
        env:
          ConnectionStrings__DefaultConnection: ${{ secrets.NEON_CONNECTION_STRING }}
        run: dotnet ef database update --project ${{ env.MIGRATIONS_PROJECT }} --startup-project ${{ env.STARTUP_PROJECT }}

  deploy:
    runs-on: ubuntu-latest
    needs: migrate
    environment:
      name: staging
      url: ${{ steps.deploy-to-webapp.outputs.webapp-url }}

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: api-publish
          path: ${{ env.PUBLISH_DIR }}

      - name: Deploy to Azure Web App staging slot
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: ${{ env.AZURE_WEBAPP_NAME }}
          slot-name: staging
          publish-profile: ${{ secrets.AZURE_WEBAPP_PUBLISH_PROFILE }}
          package: ${{ env.PUBLISH_DIR }}